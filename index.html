<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Dashboard | GNOME Style</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="glass-overlay"></div>

    <div id="searchOverlay" class="search-overlay">
        <div class="search-modal">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="appSearch" placeholder="Search apps..." autocomplete="off">
            <span class="esc-hint">ESC to close</span>
        </div>
    </div>

    <main class="dashboard">
        <header class="top-section">
            <section id="favoritesSection" class="favorites-grid">
                </section>
        </header>

        <section id="mainGrid" class="main-grid">
            </section>

        <div class="action-bar">
            <button class="btn-fab" id="openSearchBtn" title="Search (Alt + S)">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <button class="btn-fab secondary" id="addAppBtn" title="Add New Link">
                <i class="fa-solid fa-plus"></i>
            </button>
            <button class="btn-fab secondary" id="manageFoldersBtn" title="Manage Categories">
                <i class="fa-solid fa-folder-plus"></i>
            </button>
            <button class="btn-fab secondary" id="exportBtn" title="Export Backup">
                <i class="fa-solid fa-file-export"></i>
            </button>
            <button class="btn-fab secondary" id="importBtn" title="Import Backup">
                <i class="fa-solid fa-file-import"></i>
            </button>
            <input type="file" id="importFile" style="display: none;" accept=".json">
        </div>
    </main>

    <div id="appModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalTitle">Shortcut Settings</h3>
            <form id="appForm">
                <input type="hidden" id="editId">
                <div class="input-group">
                    <label>App Name</label>
                    <input type="text" id="appName" required>
                </div>
                <div class="input-group">
                    <label>URL</label>
                    <input type="url" id="appUrl" required>
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="appCategory"></select>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="appFavorite">
                    <label for="appFavorite">Favorite / Pinned</label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-text" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="folderModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Manage Categories</h3>
            <div id="folderList" class="folder-list-editor"></div>
            <div class="input-group" style="margin-top: 20px;">
                <input type="text" id="newFolderName" placeholder="Category Name...">
                <button class="btn-primary" id="createNewFolder" style="margin-top: 10px; width: 100%;">Create Category</button>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-primary" id="closeFolderModal">Done</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
