<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ykzir Polyglot | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-layer-group"></i>
                    <span>Ykzir Polyglot</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">MAIN</div>
                <button class="nav-item active" onclick="switchTab('all')"><i class="fa-solid fa-house"></i> All Apps</button>
                <button class="nav-item" onclick="switchTab('fav')"><i class="fa-solid fa-star"></i> Favorites</button>
                <button class="nav-item" onclick="switchTab('stats')"><i class="fa-solid fa-chart-pie"></i> Statistics</button>
                
                <div class="nav-section">CATEGORIES</div>
                <div id="sidebarCategories"></div>

                <div class="nav-section">SYSTEM</div>
                <button class="nav-item" onclick="openSearch()"><i class="fa-solid fa-search"></i> Search</button>
                <button class="nav-item" onclick="showModal('appModal')"><i class="fa-solid fa-plus"></i> Add Link</button>
                <button class="nav-item" onclick="showModal('folderModal')"><i class="fa-solid fa-folder-plus"></i> Manage Folders</button>
                <button class="nav-item" onclick="exportData()"><i class="fa-solid fa-download"></i> Export JSON</button>
                <button class="nav-item" onclick="importData()"><i class="fa-solid fa-upload"></i> Import JSON</button>
            </nav>
            <input type="file" id="importFile" hidden accept=".json">
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h2 id="currentTabTitle">Dashboard Overview</h2>
                <div class="header-tools">
                    <span id="dateTime"></span>
                </div>
            </header>

            <div id="statsView" class="stats-container" style="display: none;">
                </div>

            <div id="appGrid" class="app-grid">
                </div>
        </main>
    </div>

    <div id="appModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Shortcut Settings</h3>
            <form id="appForm">
                <input type="hidden" id="editId">
                <input type="text" id="appName" placeholder="App Name" required>
                <input type="url" id="appUrl" placeholder="URL (https://...)" required>
                <select id="appCategory"></select>
                <div style="margin-top:10px">
                    <input type="checkbox" id="appFavorite"> <label>Mark as Favorite</label>
                </div>
                <div class="modal-actions">
                    <button type="button" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="folderModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Categories</h3>
            <div id="folderList"></div>
            <input type="text" id="newFolderName" placeholder="New category name">
            <button class="btn-primary" onclick="addCategory()">Add Folder</button>
            <div class="modal-actions"><button onclick="closeModals()">Close</button></div>
        </div>
    </div>

    <div id="searchOverlay" class="search-overlay">
        <div class="search-box">
            <input type="text" id="appSearch" placeholder="Search apps..." autofocus>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
